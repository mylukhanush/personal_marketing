<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Marketing</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo">Marketo</a>
    </header>

    <main class="container">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search incredible products...">
        </div>

        <div id="loader" class="loader"></div>
        <div id="productsGrid" class="products-grid hidden"></div>
        <div id="noProducts" class="hidden" style="text-align: center; margin-top: 50px; font-size: 1.2rem; color: var(--text-secondary);">
            No products found.
        </div>
    </main>

    <script src="/static/js/main.js"></script>
</body>
</html>
