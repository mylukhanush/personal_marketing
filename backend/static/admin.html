<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo">Marketo Admin</a>
        <button id="logoutBtn" class="btn btn-danger hidden">Logout</button>
    </header>

    <main class="container">
        <!-- Dashboard (Hidden until logged in) -->
        <div id="dashboardView" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1>Manage Products</h1>
                <button id="openAddModalBtn" class="btn">+ New Product</button>
            </div>
            <div id="loader" class="loader"></div>
            <div id="productsGrid" class="products-grid"></div>
        </div>
    </main>

    <!-- Login Modal -->
    <div id="loginModal" class="modal active">
        <div class="modal-content">
            <h2 class="modal-title">Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Add Product</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" step="0.01" id="productPrice" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="productDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Product Image</label>
                    <input type="file" id="productImage" accept="image/*">
                    <img id="imagePreview" class="image-preview">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" id="closeModalBtn" class="btn btn-danger" style="flex: 1;">Cancel</button>
                    <button type="submit" class="btn" style="flex: 1;">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
